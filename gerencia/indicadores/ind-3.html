<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Indicador 3 – Presentación de propuestas técnico económicas</title>
  <link rel="stylesheet" href="../../area-base.css">
  <style>
    :root { --area-color: #b71c1c; --area-color-rgb: 183, 28, 28; }
    body { background: #ffebee; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 12.5px; color: #222; margin: 0; }
    .ind-header { background: var(--area-color); color: #fff; padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ind-num   { background: rgba(255,255,255,.2); font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; flex-shrink: 0; }
    .ind-title { font-size: 13px; font-weight: 600; flex: 1; }
    .ind-peso  { font-size: 12px; color: rgba(255,255,255,.75); flex-shrink: 0; }
    .grupo-bar { background: #ffcdd2; padding: 5px 18px; font-size: 11px; color: #374151; border-bottom: 1px solid #ef9a9a; display: flex; align-items: center; gap: 6px; }
    .periodo-tag { background: var(--area-color); color: #fff; font-size: 10.5px; font-weight: 700; padding: 1px 9px; border-radius: 10px; }
    .nota-anual { font-size: 10.5px; color: #6b7e96; font-style: italic; padding: 6px 18px 2px; }
    .tbl-wrap { padding: 10px 18px 14px; overflow-x: auto; }
    table.ind-tabla { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 12px; }
    .ind-tabla th { background: var(--area-color); color: #fff; padding: 7px 8px; text-align: center; border: 1px solid rgba(255,255,255,.25); font-weight: 600; font-size: 11px; line-height: 1.35; }
    .ind-tabla td { border: 1px solid #ef9a9a; padding: 7px 9px; vertical-align: middle; }
    .td-formula { background: #ffcdd2 !important; min-width: 200px; }
    .td-formula textarea { width: 100%; resize: vertical; border: 1px solid #ef9a9a; border-radius: 4px; padding: 4px 6px; font-size: 11px; font-family: inherit; background: #fff8f8; color: #222; box-sizing: border-box; font-style: italic; min-height: 68px; }
    .td-meta { text-align: center; min-width: 140px; vertical-align: top; }
    .inp-meta { width: 100%; box-sizing: border-box; border: 1px solid #ef9a9a; border-radius: 4px; padding: 4px 6px; font-size: 11px; background: #fff; color: #222; resize: vertical; min-height: 68px; font-family: inherit; }
    .td-soporte { background: #fff8f8 !important; text-align: center; min-width: 130px; }
    .td-soporte textarea { width: 100%; resize: vertical; border: 1px solid #ef9a9a; border-radius: 4px; padding: 4px 6px; font-size: 11px; font-family: inherit; background: #fff; color: #222; box-sizing: border-box; min-height: 68px; }
    .td-resultado { text-align: center; min-width: 110px; }
    .inp-resultado { width: 100%; box-sizing: border-box; border: 1px solid #ef9a9a; border-radius: 4px; padding: 5px 7px; font-size: 12px; background: #fff; text-align: center; }
    .inp-resultado:focus { border-color: var(--area-color); outline: none; }
    .td-peso-max { text-align: center; font-weight: 800; font-size: 18px; color: var(--area-color); background: #ffcdd2 !important; width: 72px; }
    .td-puntaje { text-align: center; min-width: 120px; }
    .punt-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .inp-punt { width: 90px; text-align: center; font-size: 22px; font-weight: 800; border: 2px solid #ef9a9a; border-radius: 6px; padding: 6px 8px; background: #ffcdd2; color: var(--area-color); -moz-appearance: textfield; appearance: textfield; font-family: inherit; }
    .inp-punt::-webkit-inner-spin-button { display: none; }
    .inp-punt:focus { border-color: var(--area-color); outline: none; background: #fff; }
    .punt-de { font-size: 10px; color: #94a3b8; }
    .punt-bar { height: 5px; border-radius: 3px; background: #e2e8f0; margin-top: 4px; width: 90px; overflow: hidden; }
    .punt-bar-fill { height: 100%; background: var(--area-color); transition: width .3s; }
    .badge-criterio { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 10.5px; font-weight: 700; background: #fff3e0; color: #e65100; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="ind-header">
    <span class="ind-num">Ítem 3</span>
    <span class="ind-title">Presentación de propuestas técnico económicas</span>
    <span class="ind-peso">Peso: 20</span>
  </div>
  <div class="grupo-bar">Período: <span class="periodo-tag" id="periodoTag">—</span></div>
  <div class="nota-anual">ℹ️ Puntaje asignado a criterio (máx 20). Fórmula, meta y soporte son anuales. Resultado y puntaje se registran por mes.</div>
  <div class="tbl-wrap">
    <table class="ind-tabla">
      <thead>
        <tr>
          <th>Fórmula</th>
          <th>Meta 2026</th>
          <th>Soporte a anexar</th>
          <th>Resultado</th>
          <th>Puntaje<br>Máx</th>
          <th>Puntaje<br>asignado</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="td-formula">
            <textarea id="formula" oninput="onCfg()"></textarea>
          </td>
          <td class="td-meta">
            <textarea class="inp-meta" id="meta" oninput="onCfg()"></textarea>
          </td>
          <td class="td-soporte">
            <textarea id="soporte" oninput="onCfg()"></textarea>
          </td>
          <td class="td-resultado">
            <input class="inp-resultado" type="text" id="resultado" placeholder="Ej: 2 ofertas presentadas" oninput="onDat()">
            <div class="badge-criterio">A criterio</div>
          </td>
          <td class="td-peso-max">20</td>
          <td class="td-puntaje">
            <div class="punt-group">
              <input class="inp-punt" type="number" id="puntaje" min="0" max="20" step="0.01" placeholder="0" oninput="onDat()">
              <span class="punt-de">de 20</span>
              <div class="punt-bar"><div class="punt-bar-fill" id="puntBar" style="width:0%"></div></div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <script>
    const params  = new URLSearchParams(location.search);
    const ANIO    = parseInt(params.get('anio')) || new Date().getFullYear();
    const MES     = parseInt(params.get('mes'))  || (new Date().getMonth() + 1);
    const MES_PAD = String(MES).padStart(2, '0');
    const PESO    = 20;
    const MESES_NOM = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    document.getElementById('periodoTag').textContent = `${MESES_NOM[MES - 1]} ${ANIO}`;

    const CFG_KEY = `indger3_config_${ANIO}`;
    const DAT_KEY = `indger3_data_${ANIO}_${MES_PAD}`;
    let cfg, dat;
    const el = id => document.getElementById(id);

    function loadAll() {
      const sc = localStorage.getItem(CFG_KEY);
      cfg = sc ? JSON.parse(sc) : {
        formula:  'No. De ofertas económicas presentadas en el sector de energía y en otros sectores',
        meta:     '2 ofertas económicas al mes sector energía / 1 oferta bimestral en otros sectores',
        soporte:  'Correo evidencia cargue de propuesta'
      };
      const sd = localStorage.getItem(DAT_KEY);
      dat = sd ? JSON.parse(sd) : { resultado: '', puntaje: '' };

      el('formula').value   = cfg.formula  || '';
      el('meta').value      = cfg.meta     || '';
      el('soporte').value   = cfg.soporte  || '';
      el('resultado').value = dat.resultado || '';
      el('puntaje').value   = dat.puntaje  || '';

      calcYRender();
    }

    function calcYRender() {
      const p = Math.min(Math.max(parseFloat(el('puntaje').value) || 0, 0), PESO);
      el('puntBar').style.width = (p / PESO * 100) + '%';
      postReal(p);
    }

    function postReal(p) {
      parent.postMessage({ type: 'setReal', id: '3', real: Math.round((p / PESO) * 1000) / 10, anio: ANIO, mes: MES }, '*');
    }

    function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
    function saveDat() { localStorage.setItem(DAT_KEY, JSON.stringify(dat)); }

    let cfgT, datT;
    function onCfg() {
      cfg.formula = el('formula').value; cfg.meta = el('meta').value; cfg.soporte = el('soporte').value;
      clearTimeout(cfgT); cfgT = setTimeout(saveCfg, 600);
    }
    function onDat() {
      dat.resultado = el('resultado').value; dat.puntaje = el('puntaje').value;
      clearTimeout(datT); datT = setTimeout(saveDat, 600);
      calcYRender();
    }

    loadAll();
  </script>
<script src="../../notas.js"></script></body>
</html>
