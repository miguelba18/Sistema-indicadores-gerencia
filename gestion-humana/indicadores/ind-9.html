<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Indicador 9 – Desvíos de nómina por fueros</title>
  <link rel="stylesheet" href="../../area-base.css">
  <style>
    :root { --area-color: #6a1b9a; --area-color-rgb: 106, 27, 154; }
    body { background: #f5f0ff; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 12.5px; color: #222; margin: 0; }
    .ind-header { background: var(--area-color); color: #fff; padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ind-num   { background: rgba(255,255,255,.2); font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; flex-shrink: 0; }
    .ind-title { font-size: 13px; font-weight: 600; flex: 1; }
    .ind-peso  { font-size: 12px; color: rgba(255,255,255,.75); flex-shrink: 0; }
    .grupo-bar { background: #ede7f6; padding: 5px 18px; font-size: 11px; color: #374151; border-bottom: 1px solid #ce93d8; display: flex; align-items: center; gap: 6px; }
    .periodo-tag { background: var(--area-color); color: #fff; font-size: 10.5px; font-weight: 700; padding: 1px 9px; border-radius: 10px; }
    .nota-anual { font-size: 10.5px; color: #6b7e96; font-style: italic; padding: 6px 18px 2px; }
    .tbl-wrap { padding: 10px 18px 14px; overflow-x: auto; }
    table.ind-tabla { width: 100%; border-collapse: collapse; min-width: 820px; font-size: 12px; }
    .ind-tabla th { background: var(--area-color); color: #fff; padding: 7px 8px; text-align: center; border: 1px solid rgba(255,255,255,.25); font-weight: 600; font-size: 11px; line-height: 1.35; }
    .ind-tabla td { border: 1px solid #ce93d8; padding: 7px 9px; vertical-align: middle; }

    /* Anuales */
    .td-formula { background: #ede7f6 !important; min-width: 190px; }
    .td-formula textarea, .td-soporte textarea { width: 100%; resize: vertical; border: 1px solid #ce93d8; border-radius: 4px; padding: 4px 6px; font-size: 11px; font-family: inherit; background: #fff; color: #222; box-sizing: border-box; }
    .td-formula textarea { font-style: italic; background: #faf5ff; min-height: 60px; }
    .td-meta { text-align: center; min-width: 70px; }
    .inp-meta { width: 100%; box-sizing: border-box; border: 1px solid #ce93d8; border-radius: 4px; padding: 5px 7px; font-size: 13px; font-weight: 700; background: #fff; text-align: center; }
    .td-soporte { background: #f3e8ff !important; text-align: center; min-width: 130px; }
    .td-soporte textarea { min-height: 60px; }

    /* Campo mensual */
    .td-personas { text-align: center; min-width: 120px; background: #f9fafb; }
    .inp-personas { width: 80px; text-align: center; font-size: 28px; font-weight: 800; border: 2px solid #ce93d8; border-radius: 6px; padding: 6px 8px; background: #fff; color: #374151; -moz-appearance: textfield; appearance: textfield; }
    .inp-personas::-webkit-inner-spin-button { display: none; }
    .inp-personas:focus { border-color: var(--area-color); outline: none; background: #f5f0ff; }
    .personas-label { font-size: 10px; color: #94a3b8; margin-top: 4px; }

    /* Resultado / badge */
    .td-resultado { text-align: center; min-width: 120px; }
    .badge { display: inline-block; padding: 5px 14px; border-radius: 12px; font-size: 12px; font-weight: 700; }
    .badge-cumple   { background: #dcfce7; color: #15803d; }
    .badge-nocumple { background: #fee2e2; color: #b91c1c; }
    .badge-sin      { background: #f1f5f9; color: #94a3b8; }

    /* Puntaje */
    .td-peso-max { text-align: center; font-weight: 800; font-size: 18px; color: var(--area-color); background: #f3e8ff !important; width: 68px; }
    .td-puntaje  { text-align: center; min-width: 110px; }
    .punt-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .inp-punt-auto { width: 70px; text-align: center; font-size: 20px; font-weight: 800; border: 2px solid #ce93d8; border-radius: 6px; padding: 5px 6px; background: #f5f0ff; color: var(--area-color); cursor: default; }
    .punt-de { font-size: 10px; color: #94a3b8; }
    .punt-bar { height: 5px; border-radius: 3px; background: #e2e8f0; margin-top: 4px; width: 70px; overflow: hidden; }
    .punt-bar-fill { height: 100%; background: var(--area-color); transition: width .3s; }
    .override-row { margin-top: 6px; }
    .override-row label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 2px; }
    .inp-override { width: 70px; text-align: center; font-size: 13px; font-weight: 700; border: 1.5px dashed #ce93d8; border-radius: 6px; padding: 3px 5px; background: #fff; color: #374151; -moz-appearance: textfield; appearance: textfield; }
    .inp-override::-webkit-inner-spin-button { display: none; }
    .inp-override:focus { border-color: var(--area-color); outline: none; }
  </style>
</head>
<body>
  <div class="ind-header">
    <span class="ind-num">Ítem 9</span>
    <span class="ind-title">Desvíos de nómina por fueros</span>
    <span class="ind-peso">Peso: 5</span>
  </div>
  <div class="grupo-bar">Período: <span class="periodo-tag" id="periodoTag">—</span></div>
  <div class="nota-anual">ℹ️ Fórmula, meta y soporte son anuales. No. de personas y puntaje se registran por mes.</div>
  <div class="tbl-wrap">
    <table class="ind-tabla">
      <thead>
        <tr>
          <th>Fórmula</th>
          <th>Meta 2026</th>
          <th>Soporte a anexar</th>
          <th>No. personas<br><span style="font-weight:400;font-size:10px">por fuero</span></th>
          <th>Resultado</th>
          <th>Puntaje<br>Máx</th>
          <th>Puntaje<br>asignado</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="td-formula">
            <textarea id="formula" oninput="onCfg()" placeholder="Descripción de la fórmula..."></textarea>
          </td>
          <td class="td-meta">
            <input class="inp-meta" type="number" id="meta" min="0" step="1" oninput="onCfg(); calcYRender();" placeholder="0">
          </td>
          <td class="td-soporte">
            <textarea id="soporte" oninput="onCfg()" placeholder="Soporte..."></textarea>
          </td>
          <td class="td-personas">
            <input class="inp-personas" type="number" id="personas" min="0" step="1" placeholder="0" oninput="onDat()">
            <div class="personas-label">personas por fuero</div>
          </td>
          <td class="td-resultado">
            <span class="badge badge-sin" id="badgeResultado">—</span>
          </td>
          <td class="td-peso-max">5</td>
          <td class="td-puntaje">
            <div class="punt-group">
              <input class="inp-punt-auto" type="text" id="puntAuto" value="—" readonly tabindex="-1">
              <span class="punt-de">de 5</span>
              <div class="punt-bar"><div class="punt-bar-fill" id="puntBar" style="width:0%"></div></div>
              <div class="override-row">
                <label>Ajuste manual (opcional)</label>
                <input class="inp-override" type="number" id="puntOverride" min="0" max="5" step="0.01" placeholder="—" onchange="onOverride()">
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <script>
    const params  = new URLSearchParams(location.search);
    const ANIO    = parseInt(params.get('anio')) || new Date().getFullYear();
    const MES     = parseInt(params.get('mes'))  || (new Date().getMonth() + 1);
    const MES_PAD = String(MES).padStart(2, '0');
    const PESO    = 5;
    const MESES_NOM = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    document.getElementById('periodoTag').textContent = `${MESES_NOM[MES - 1]} ${ANIO}`;
    const CFG_KEY = `indgh9_config_${ANIO}`;
    const DAT_KEY = `indgh9_data_${ANIO}_${MES_PAD}`;
    const OVR_KEY = `indgh9_override_${ANIO}_${MES_PAD}`;
    let cfg, dat;

    function loadAll() {
      const sc = localStorage.getItem(CFG_KEY);
      cfg = sc ? JSON.parse(sc) : {
        formula: 'Número de personas a cargo de la empresa luego de terminado el contrato o centro de costos por causa de fueros de salud',
        meta: '0',
        soporte: 'Información dada por GH'
      };
      const sd = localStorage.getItem(DAT_KEY);
      dat = sd ? JSON.parse(sd) : { personas: '' };

      document.getElementById('formula').value  = cfg.formula || '';
      document.getElementById('meta').value     = cfg.meta !== undefined ? cfg.meta : '0';
      document.getElementById('soporte').value  = cfg.soporte || '';
      document.getElementById('personas').value = dat.personas !== '' ? dat.personas : '';

      const ovr = localStorage.getItem(OVR_KEY);
      document.getElementById('puntOverride').value = ovr !== null ? ovr : '';
      calcYRender();
    }

    function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
    function saveDat() { localStorage.setItem(DAT_KEY, JSON.stringify(dat)); }

    function calcYRender() {
      const pVal    = document.getElementById('personas').value;
      const mVal    = document.getElementById('meta').value;
      const personas = pVal !== '' ? parseInt(pVal, 10) : null;
      const meta     = mVal !== '' ? parseInt(mVal, 10) : 0;
      const badge    = document.getElementById('badgeResultado');
      let autoPunt   = '';

      if (personas === null) {
        badge.textContent = '—'; badge.className = 'badge badge-sin';
      } else if (personas <= meta) {
        badge.textContent = '✓ Cumple';    badge.className = 'badge badge-cumple';
        autoPunt = PESO;
      } else {
        badge.textContent = '✗ No cumple'; badge.className = 'badge badge-nocumple';
        autoPunt = 0;
      }

      const ovrEl    = document.getElementById('puntOverride');
      const efectivo = ovrEl.value !== '' ? parseFloat(ovrEl.value) : autoPunt;
      document.getElementById('puntAuto').value      = autoPunt !== '' ? autoPunt : '—';
      document.getElementById('puntBar').style.width = (efectivo !== '' ? Math.min(efectivo / PESO * 100, 100) : 0) + '%';
      postReal(efectivo !== '' ? efectivo : 0);
    }

    function postReal(p) {
      parent.postMessage({ type: 'setReal', id: '9', real: Math.round((parseFloat(p) / PESO) * 1000) / 10, anio: ANIO, mes: MES }, '*');
    }

    let cfgTimer, datTimer;
    function onCfg() {
      cfg.formula = document.getElementById('formula').value;
      cfg.meta    = document.getElementById('meta').value;
      cfg.soporte = document.getElementById('soporte').value;
      clearTimeout(cfgTimer); cfgTimer = setTimeout(saveCfg, 600);
    }
    function onDat() {
      dat.personas = document.getElementById('personas').value;
      clearTimeout(datTimer); datTimer = setTimeout(saveDat, 600);
      calcYRender();
    }
    function onOverride() {
      const el = document.getElementById('puntOverride');
      let v = el.value !== '' ? parseFloat(el.value) : '';
      if (v !== '' && v < 0)    { v = 0;    el.value = 0; }
      if (v !== '' && v > PESO) { v = PESO; el.value = PESO; }
      if (v !== '') localStorage.setItem(OVR_KEY, v);
      else          localStorage.removeItem(OVR_KEY);
      calcYRender();
    }

    loadAll();
  </script>
<script src="../../notas.js"></script></body>
</html>
