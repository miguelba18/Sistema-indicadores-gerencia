<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="gOuter" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e4a8a"/>
      <stop offset="100%" stop-color="#0d2550"/>
    </radialGradient>
    <radialGradient id="gInner" cx="40%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#7aaad4"/>
      <stop offset="60%" stop-color="#4a80b8"/>
      <stop offset="100%" stop-color="#1e5a9a"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="56"/>
    </clipPath>
  </defs>

  <!-- Fondo circular blanco suave -->
  <circle cx="60" cy="60" r="58" fill="white" opacity="0.08"/>

  <!-- Ala/mano exterior – azul oscuro -->
  <path d="
    M 60 8
    C 90 8, 112 30, 112 60
    C 112 80, 100 96, 82 104
    C 70 110, 56 112, 44 108
    C 36 105, 30 100, 28 94
    C 26 88, 28 80, 34 74
    C 40 68, 50 64, 60 62
    C 70 60, 80 58, 86 52
    C 92 46, 94 36, 88 28
    C 82 20, 72 14, 60 8 Z
  " fill="url(#gOuter)" clip-path="url(#circleClip)"/>

  <!-- Ala/mano interior – azul medio/claro -->
  <path d="
    M 60 112
    C 30 112, 8 90, 8 60
    C 8 40, 20 24, 38 16
    C 50 10, 64 8, 76 12
    C 84 15, 90 20, 92 26
    C 94 32, 92 40, 86 46
    C 80 52, 70 56, 60 58
    C 50 60, 40 62, 34 68
    C 28 74, 26 84, 32 92
    C 38 100, 48 108, 60 112 Z
  " fill="url(#gInner)" clip-path="url(#circleClip)"/>

  <!-- Borde circular -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#1a3a6b" stroke-width="1.5" opacity="0.3"/>
</svg>
