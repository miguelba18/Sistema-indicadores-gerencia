<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contabilidad – Indicadores</title>
  <link rel="stylesheet" href="../area-base.css">
  <style>
    :root { --area-color: #00695c; --area-color-rgb: 0, 105, 92; }

    .action-bar {
      background: #fff; border-bottom: 1px solid #dde4ef;
      padding: 8px 20px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .16s; font-family: inherit; white-space: nowrap;
    }
    .btn-primary { background: var(--area-color); color: #fff; border-color: var(--area-color); }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-outline { background: #fff; color: var(--area-color); border-color: var(--area-color); }
    .btn-outline:hover { background: rgba(var(--area-color-rgb),.07); }
    .btn-ghost  { background: #fff; color: #64748b; border-color: #cbd5e0; }
    .btn-ghost:hover  { background: #f8fafc; }
    .btn-danger { background: #fff; color: #dc2626; border-color: #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .action-sep { flex: 1; }
    .save-status { font-size: 11.5px; color: #94a3b8; display: flex; align-items: center; gap: 4px; }
    .save-status.ok   { color: #16a34a; }
    .save-status.warn { color: #d97706; }

    .table-wrap { padding: 18px 20px 0; overflow-x: auto; }
    .tabla { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 680px; }
    .tabla thead tr { background: var(--area-color); }
    .tabla thead th {
      color: #fff; padding: 9px 10px; font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
    }
    .tabla thead th.tc { text-align: center; }
    .tabla tbody tr.ind-row { border-bottom: 1px solid #e8eef6; }
    .tabla tbody tr.ind-row:hover { background: #e0f2f1; }
    .tabla tbody td { padding: 8px 10px; vertical-align: middle; }

    .ci  { width: 38px; text-align: center; font-weight: 700; color: var(--area-color); font-size: 13px; }
    .cp  { width: 54px; text-align: center; font-weight: 700; color: #374151; }
    .cc  { width: 90px; text-align: center; font-weight: 600; }
    .cind { line-height: 1.45; }

    .toggle-btn {
      padding: 2px 9px; border-radius: 5px; border: 1.5px solid #d0d9e8;
      background: #f8fafc; cursor: pointer; font-size: 11px; color: #64748b;
      font-family: inherit; transition: all .15s; margin-top: 1px;
    }
    .toggle-btn:hover { background: #e0f2f1; border-color: var(--area-color); color: var(--area-color); }
    .toggle-btn.open {
      background: rgba(var(--area-color-rgb),.1); border-color: var(--area-color);
      color: var(--area-color); font-weight: 700;
    }

    .det-row { display: none; }
    .det-row.open { display: table-row; }
    .det-cell { padding: 0 !important; background: #e0f2f1; }
    .det-inner {
      border-top: 2px solid rgba(var(--area-color-rgb),.2);
      border-bottom: 2px solid rgba(var(--area-color-rgb),.2);
    }
    .det-inner iframe { width: 100%; height: 400px; border: none; display: block; }

    .row-total td { background: #b2dfdb; border-top: 2px solid var(--area-color); font-weight: 700; }
    .total-lbl { text-align: right; color: #374151; }
    #tdTotalPeso { text-align: center; }
    #tdTotalPunt { text-align: center; font-size: 15px; color: var(--area-color); }

    .score-wrap { padding: 16px 20px 20px; }
    .score-card {
      background: #fff; border-radius: 12px; padding: 18px 22px;
      display: flex; align-items: center; gap: 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07); flex-wrap: wrap;
      border-top: 4px solid var(--area-color);
    }
    .sc-main { text-align: center; min-width: 80px; }
    .sc-main .sc-num { font-size: 40px; font-weight: 800; color: var(--area-color); line-height: 1; }
    .sc-main .sc-sub { font-size: 11px; color: #94a3b8; font-weight: 600; letter-spacing: .4px; margin-top: 3px; }
    .sc-div { width: 1px; height: 56px; background: #e2e8f0; flex-shrink: 0; }
    .sc-stats { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
    .sc-stat { text-align: center; }
    .sc-stat .sv { font-size: 22px; font-weight: 700; line-height: 1; }
    .sc-stat .sl { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }
    .c-verde { color: #16a34a; } .c-amari { color: #d97706; }
    .c-rojo  { color: #dc2626; } .c-gris  { color: #94a3b8; }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #00695c; color: #fff;
      padding: 9px 16px; border-radius: 8px; font-size: 12.5px; font-weight: 500;
      box-shadow: 0 4px 14px rgba(0,0,0,.22);
      transform: translateY(60px); opacity: 0; transition: all .28s ease;
      z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.t-ok  { background: #15803d; }
    .toast.t-err { background: #dc2626; }
    .toast.t-inf { background: #00695c; }
  </style>
</head>
<body>

  <div class="area-header">
    <span class="area-title">📊 Contabilidad</span>
    <span class="area-badge">Indicadores de Gestión</span>
  </div>

  <div class="period-bar">
    <label>Año</label>
    <select id="selAnio">
      <option>2023</option><option>2024</option><option>2025</option><option selected>2026</option>
    </select>
    <label>Mes</label>
    <select id="selMes">
      <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
      <option value="4" selected>Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
      <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
      <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
    </select>
    <span class="period-label" id="periodoLabel">Abril 2026</span>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary"  onclick="guardar()">💾 Guardar</button>
    <button class="btn btn-outline"  onclick="exportJSON()">⬇ Exportar JSON</button>
    <button class="btn btn-ghost"    onclick="fileInput.click()">⬆ Importar JSON</button>
    <button class="btn btn-ghost"    onclick="exportCSV()">📊 Exportar Excel (CSV)</button>
    <span class="action-sep"></span>
    <button class="btn btn-danger"   onclick="limpiar()">🗑 Limpiar periodo</button>
    <span class="save-status" id="saveStatus">Sin datos</span>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importJSON(event)">

  <div class="table-wrap">
    <table class="tabla">
      <thead>
        <tr>
          <th class="tc">#</th>
          <th>Indicador</th>
          <th class="tc">Peso</th>
          <th class="tc">Puntaje</th>
          <th class="tc">Cumpl.&nbsp;%</th>
          <th class="tc">Detalle</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="score-wrap">
    <div class="score-card">
      <div class="sc-main">
        <div class="sc-num" id="scNum">—</div>
        <div class="sc-sub">PUNTAJE / 100</div>
      </div>
      <div class="sc-div"></div>
      <div class="sc-stats">
        <div class="sc-stat"><div class="sv c-verde" id="cVerde">—</div><div class="sl">En meta</div></div>
        <div class="sc-stat"><div class="sv c-amari" id="cAmari">—</div><div class="sl">En riesgo</div></div>
        <div class="sc-stat"><div class="sv c-rojo"  id="cRojo">—</div><div class="sl">Fuera meta</div></div>
        <div class="sc-stat"><div class="sv c-gris"  id="cSin">9</div><div class="sl">Sin datos</div></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const IND = [
  { id:'1', item:'1', peso:20, label:'Entrega oportuna de información' },
  { id:'2', item:'2', peso:20, label:'Ejecución Presupuestal' },
  { id:'3', item:'3', peso:7.5, label:'Entrega oportuna de información – Seguimiento y planes de acción por desvíos presupuestales' },
  { id:'4', item:'4', peso:7.5, label:'Cierre oportuno de planes de acción por desvíos presupuestales' },
  { id:'5', item:'5', peso:10,  label:'Elaboración y formulación de pagos tributarios' },
  { id:'6', item:'6', peso:10,  label:'Apoyo en los procesos licitatorios' },
  { id:'7', item:'7', peso:10,  label:'Seguimiento del cierre efectivo de la matriz RYOM' },
  { id:'8', item:'8', peso:5,   label:'Participación en las capacitaciones programadas' },
  { id:'9', item:'9', peso:10,  label:'Entrega de información de DIAN para conciliación de proveeduría' },
];

const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const $anio = () => document.getElementById('selAnio').value;
const $mes  = () => document.getElementById('selMes').value;
const $key  = () => `ind_cont_${$anio()}_${$mes().padStart(2,'0')}`;

function updateLabel() {
  document.getElementById('periodoLabel').textContent = `${MESES[+$mes()]} ${$anio()}`;
}

document.getElementById('selAnio').addEventListener('change', () => { cerrarTodos(); updateLabel(); cargar(); });
document.getElementById('selMes').addEventListener('change',  () => { cerrarTodos(); updateLabel(); cargar(); });

function buildTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  IND.forEach(ind => {
    const tr = document.createElement('tr');
    tr.className = 'ind-row';
    tr.id = `row-${ind.id}`;

    let cells = `<td class="ci">${ind.item}</td>`;
    cells += `<td class="cind">${ind.label}</td>`;
    cells += `<td class="cp tc">${ind.peso}</td>`;
    cells += `<td class="cc tc" id="p_${ind.id}">—</td>`;
    cells += `<td class="cc tc" id="c_${ind.id}">—</td>`;
    cells += `<td class="tc" style="width:80px">
                <button class="toggle-btn" id="btn-${ind.id}" onclick="toggleDet('${ind.id}')">▶ Ver</button>
              </td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);

    const trDet = document.createElement('tr');
    trDet.className = 'det-row';
    trDet.id = `det-${ind.id}`;
    trDet.innerHTML = `
      <td colspan="6" class="det-cell">
        <div class="det-inner">
          <iframe id="iframe-${ind.id}" data-src="indicadores/ind-${ind.id}.html"
                  title="Detalle indicador ${ind.item}"></iframe>
        </div>
      </td>`;
    tbody.appendChild(trDet);
  });

  const pMax = IND.reduce((s, i) => s + i.peso, 0);
  const trTot = document.createElement('tr');
  trTot.className = 'row-total';
  trTot.innerHTML = `
    <td colspan="2" class="total-lbl">TOTAL</td>
    <td id="tdTotalPeso" class="tc">${pMax}</td>
    <td id="tdTotalPunt" class="cc tc">—</td>
    <td></td><td></td>`;
  tbody.appendChild(trTot);
}

function toggleDet(id) {
  const det    = document.getElementById(`det-${id}`);
  const btn    = document.getElementById(`btn-${id}`);
  const iframe = document.getElementById(`iframe-${id}`);
  const isOpen = det.classList.contains('open');
  if (isOpen) {
    det.classList.remove('open'); btn.classList.remove('open'); btn.textContent = '▶ Ver';
  } else {
    det.classList.add('open'); btn.classList.add('open'); btn.textContent = '▼ Cerrar';
    if (iframe.dataset.src) {
      const src = iframe.dataset.src;
      iframe.src = `${src}?anio=${$anio()}&mes=${$mes()}`;
      delete iframe.dataset.src;



    }
  }
}

function cerrarTodos() {
  IND.forEach(ind => {
    const det    = document.getElementById(`det-${ind.id}`);
    const btn    = document.getElementById(`btn-${ind.id}`);
    const iframe = document.getElementById(`iframe-${ind.id}`);
    if (det && det.classList.contains('open')) {
      det.classList.remove('open'); btn.classList.remove('open'); btn.textContent = '▶ Ver';
      iframe.src = ''; iframe.dataset.src = `indicadores/ind-${ind.id}.html`;
    }
  });
}

function updateReal(id, real) {
  const ind  = IND.find(x => x.id === id);
  const cump = Math.min(100, Math.max(0, real));
  const punt = (cump / 100) * ind.peso;
  document.getElementById(`c_${id}`).textContent = cump.toFixed(1) + '%';
  document.getElementById(`p_${id}`).textContent = punt.toFixed(2);
  calcTotal();
}

function calcTotal() {
  let total = 0, hasDat = false;
  let verde = 0, amari = 0, rojo = 0, sin = 0;
  IND.forEach(ind => {
    const p = document.getElementById(`p_${ind.id}`).textContent;
    if (p !== '—') {
      total += parseFloat(p); hasDat = true;
      const cv = parseFloat(document.getElementById(`c_${ind.id}`).textContent);
      if (cv >= 80) verde++; else if (cv >= 60) amari++; else rojo++;
    } else { sin++; }
  });
  document.getElementById('tdTotalPunt').textContent = hasDat ? total.toFixed(2) : '—';
  document.getElementById('scNum').textContent        = hasDat ? total.toFixed(1) : '—';
  document.getElementById('cVerde').textContent = verde || '—';
  document.getElementById('cAmari').textContent = amari || '—';
  document.getElementById('cRojo').textContent  = rojo  || '—';
  document.getElementById('cSin').textContent   = sin;
}

window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || d.type !== 'setReal') return;
  const { id, real, anio, mes } = d;
  const rKey = `real_cont_${id}_${anio}_${String(mes).padStart(2,'0')}`;
  localStorage.setItem(rKey, real);
  if (String(anio) === $anio() && String(mes) === $mes()) {
    updateReal(id, real);
    autoGuardar();
  }
});

function getDatos() {
  const rows = {};
  IND.forEach(ind => {
    const p = document.getElementById(`p_${ind.id}`).textContent;
    const c = document.getElementById(`c_${ind.id}`).textContent;
    rows[ind.id] = { puntaje: p !== '—' ? p : null, cumpl: c !== '—' ? c : null };
  });
  return { area:'contabilidad', anio:+$anio(), mes:+$mes(), savedAt:new Date().toISOString(), rows };
}

let autoTimer;
function autoGuardar() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    localStorage.setItem($key(), JSON.stringify(getDatos()));
    setStatus('✓ Auto-guardado', 'ok');
  }, 500);
}

function guardar() {
  localStorage.setItem($key(), JSON.stringify(getDatos()));
  setStatus('✓ Guardado', 'ok');
  toast('Datos guardados', 't-ok');
}

function cargar() {
  limpiarUI();
  IND.forEach(ind => {
    const rKey = `real_cont_${ind.id}_${$anio()}_${$mes().padStart(2,'0')}`;
    const val = localStorage.getItem(rKey);
    if (val !== null) updateReal(ind.id, parseFloat(val));
  });
  const raw = localStorage.getItem($key());
  setStatus(raw ? '✓ Cargado' : 'Sin datos para este periodo', raw ? 'ok' : '');
}

function limpiarUI() {
  IND.forEach(ind => {
    document.getElementById(`c_${ind.id}`).textContent = '—';
    document.getElementById(`p_${ind.id}`).textContent = '—';
  });
  document.getElementById('tdTotalPunt').textContent = '—';
  document.getElementById('scNum').textContent       = '—';
  document.getElementById('cVerde').textContent = '—';
  document.getElementById('cAmari').textContent = '—';
  document.getElementById('cRojo').textContent  = '—';
  document.getElementById('cSin').textContent   = IND.length;
}

function limpiar() {
  if (!confirm(`¿Limpiar datos de ${MESES[+$mes()]} ${$anio()}? No se puede deshacer.`)) return;
  localStorage.removeItem($key());
  IND.forEach(ind => {
    localStorage.removeItem(`real_cont_${ind.id}_${$anio()}_${$mes().padStart(2,'0')}`);
  });
  cerrarTodos(); limpiarUI();
  setStatus('Sin datos para este periodo', '');
  toast('Periodo limpiado', 't-inf');
}

function exportJSON() {
  const payload = getDatos();
  payload.reales = {};
  IND.forEach(ind => {
    const val = localStorage.getItem(`real_cont_${ind.id}_${$anio()}_${$mes().padStart(2,'0')}`);
    if (val !== null) payload.reales[ind.id] = parseFloat(val);
  });
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  triggerDownload(blob, `contabilidad_${$anio()}_${$mes().padStart(2,'0')}.json`);
  toast('JSON exportado ✓', 't-ok');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const obj = JSON.parse(ev.target.result);
      if (obj.area !== 'contabilidad') { toast('El archivo no es de Contabilidad', 't-err'); return; }
      if (obj.anio) document.getElementById('selAnio').value = obj.anio;
      if (obj.mes)  document.getElementById('selMes').value  = obj.mes;
      cerrarTodos(); updateLabel(); limpiarUI();
      if (obj.reales) {
        Object.entries(obj.reales).forEach(([id, real]) => {
          const rKey = `real_cont_${id}_${obj.anio}_${String(obj.mes).padStart(2,'0')}`;
          localStorage.setItem(rKey, real);
          if (String(obj.anio) === $anio() && String(obj.mes) === $mes()) updateReal(id, real);
        });
      }
      guardar();
      toast(`Importado: ${MESES[obj.mes]} ${obj.anio}`, 't-ok');
    } catch { toast('Error al leer el archivo', 't-err'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportCSV() {
  const per = `${MESES[+$mes()]} ${$anio()}`;
  const rows = [
    ['Contabilidad – INDICADORES DE GESTIÓN'],
    [`Periodo: ${per}`],
    [`Exportado: ${new Date().toLocaleString('es-CO')}`],
    [],
    ['#','Indicador','Peso','Puntaje','Cumpl. %'],
  ];
  IND.forEach(ind => {
    const p = document.getElementById(`p_${ind.id}`).textContent;
    const c = document.getElementById(`c_${ind.id}`).textContent;
    rows.push([ind.item, ind.label, ind.peso, p, c]);
  });
  const pMax = IND.reduce((s,i) => s + i.peso, 0);
  const tot = document.getElementById('tdTotalPunt').textContent;
  rows.push([]); rows.push(['','TOTAL', pMax, tot,'']);
  const csv = rows.map(r => r.map(c => `"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  triggerDownload(blob, `contabilidad_${$anio()}_${$mes().padStart(2,'0')}.csv`);
  toast('CSV exportado – ábrelo en Excel', 't-ok');
}

function triggerDownload(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

function setStatus(txt, cls) {
  const el = document.getElementById('saveStatus');
  el.textContent = txt; el.className = 'save-status ' + cls;
}
let toastTimer;
function toast(msg, cls='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${cls}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

(function init() {
  const hoy = new Date();
  document.getElementById('selAnio').value = String(hoy.getFullYear());
  document.getElementById('selMes').value  = String(hoy.getMonth() + 1);
  updateLabel();
  buildTable();
  cargar();
})();
</script>
<script src="../respaldo.js"></script>
</body>
</html>
