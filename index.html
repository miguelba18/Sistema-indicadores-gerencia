<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Indicadores</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:      #1a3a5c;
      --primary-mid:  #22507a;
      --primary-light:#2a6299;
      --accent:       #e8a020;
      --accent-dim:   rgba(232, 160, 32, 0.18);
      --bg:           #eef2f7;
      --header-h:     68px;
      --tab-h:        44px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: var(--primary);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.35);
    }

    .logo {
      width: 42px; height: 42px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      background: white;
      
    }
    .logo img { width: 60px; height: 60px; object-fit: contain; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .4px;
    }

    .header-text p {
      font-size: 11.5px;
      color: rgba(255,255,255,.55);
      margin-top: 1px;
    }

    .header-right {
      margin-left: auto;
      font-size: 11.5px;
      color: rgba(255,255,255,.45);
      text-align: right;
      line-height: 1.5;
    }

    /* ── TABS ────────────────────────────────────────── */
    nav.tabs {
      position: fixed;
      top: var(--header-h); left: 0; right: 0; z-index: 99;
      height: var(--tab-h);
      background: var(--primary-mid);
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    nav.tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      height: var(--tab-h);
      padding: 0 18px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.65);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: background .18s, color .18s, border-color .18s;
      letter-spacing: .25px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,.09);
      color: #fff;
    }

    .tab-btn.active {
      color: #fff;
      border-bottom-color: var(--accent);
      background: rgba(255,255,255,.11);
    }

    .tab-btn.tab-consolidado {
      background: var(--accent-dim);
      color: var(--accent);
      border-left: 1px solid rgba(232,160,32,.25);
      margin-left: auto;
    }

    .tab-btn.tab-consolidado.active {
      background: rgba(232,160,32,.28);
      border-bottom-color: var(--accent);
      color: #fff;
    }

    /* ── CONTENT AREA ────────────────────────────────── */
    .main {
      position: fixed;
      top: calc(var(--header-h) + var(--tab-h));
      left: 0; right: 0; bottom: 0;
    }

    .panel {
      display: none;
      position: absolute;
      inset: 0;
    }

    .panel.active {
      display: block;
    }

    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── LOADING OVERLAY ─────────────────────────────── */
    .loading {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #6b7e96;
      font-size: 13px;
      pointer-events: none;
      transition: opacity .3s;
    }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #d1dce8;
      border-top-color: var(--primary-light);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .panel.loaded .loading { opacity: 0; }

    /* ── SPLASH SCREEN ───────────────────────────────── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(145deg, #0d2550 0%, #1a3a6b 45%, #1e5a9a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      transition: opacity .6s ease, visibility .6s ease;
    }
    #splash.hide { opacity: 0; visibility: hidden; }

    .splash-logo-wrap {
      display: flex; align-items: center; gap: 20px; margin-bottom: 28px;
    }
    .splash-icon {
      width: 300px; height: 150px;
      background: white; border-radius: 10%; 
      padding: 6px;
      
      animation: splashPop .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .splash-icon img { width: 100%; height: 100%; object-fit: contain; }

    .splash-brand {
      display: flex; flex-direction: column; gap: 2px;
      animation: splashSlide .5s .1s ease both;
    }
    .splash-sas {
      font-size: 48px; font-weight: 900; color: white;
      letter-spacing: 8px; line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    .splash-sub {
      font-size: 13px; color: rgba(255,255,255,.75);
      letter-spacing: 1.5px; font-weight: 400;
    }
    .splash-badge {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.9);
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      padding: 3px 10px; border-radius: 3px; margin-top: 4px;
      width: fit-content;
    }

    .splash-divider {
      width: 220px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
      margin-bottom: 24px;
      animation: splashFade .5s .25s ease both;
    }
    .splash-title {
      font-size: 15px; color: rgba(255,255,255,.85);
      font-weight: 300; letter-spacing: 1.5px;
      text-align: center; text-transform: uppercase;
      animation: splashFade .5s .3s ease both;
    }
    .splash-prog-wrap {
      margin-top: 36px; width: 200px;
      animation: splashFade .4s .5s ease both;
    }
    .splash-prog-bar {
      height: 3px; background: rgba(255,255,255,.15);
      border-radius: 3px; overflow: hidden;
    }
    .splash-prog-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7aaad4, white);
      border-radius: 3px;
      transition: width 1.8s ease;
    }
    .splash-prog-lbl {
      margin-top: 8px; font-size: 10px;
      color: rgba(255,255,255,.45); text-align: center; letter-spacing: .5px;
    }

    @keyframes splashPop {
      from { transform: scale(.6); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    @keyframes splashSlide {
      from { transform: translateX(-20px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    @keyframes splashFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-logo-wrap">
      <div class="splash-icon">
        <img src="assets/logo-full.png" alt="SAS">
      </div>
      
    </div>
    <div class="splash-divider"></div>
    <div class="splash-title">Sistema de Indicadores de Gestión</div>
    <div class="splash-prog-wrap">
      <div class="splash-prog-bar"><div class="splash-prog-fill" id="splashFill"></div></div>
      <div class="splash-prog-lbl">Bienvenido — cargando sistema...</div>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo"><img src="assets/logo-icon.png" alt="SAS"></div>
    <div class="header-text">
      <h1>Sistema de Indicadores</h1>
      <p>Gestión y seguimiento de indicadores por área</p>
    </div>
    <div class="header-right">
      <span id="fechaHoy"></span>
    </div>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="operaciones">⚙️ Operaciones</button>
    <button class="tab-btn" data-tab="gestion-humana">👥 Gestión Humana</button>
    <button class="tab-btn" data-tab="hseq">🛡️ HSEQ</button>
    <button class="tab-btn" data-tab="financiera">💼 Financiera</button>
    <button class="tab-btn" data-tab="contabilidad">📊 Contabilidad</button>
    <button class="tab-btn" data-tab="compras">🛒 Compras</button>
    <button class="tab-btn" data-tab="gerencia">🏛️ Gerencia</button>
    <button class="tab-btn tab-consolidado" data-tab="consolidado">★ Consolidado</button>
  </nav>

  <!-- PANELS -->
  <main class="main">

    <div class="panel active" id="panel-operaciones">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe src="operaciones/operaciones.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-gestion-humana">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="gestion-humana/gestion-humana.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-hseq">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="hseq/hseq.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-financiera">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="financiera/financiera.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-contabilidad">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="contabilidad/contabilidad.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-compras">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="compras/compras.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-gerencia">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="gerencia/gerencia.html" onload="panelLoaded(this)"></iframe>
    </div>

    <div class="panel" id="panel-consolidado">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
      <iframe data-src="consolidado.html" onload="panelLoaded(this)"></iframe>
    </div>

  </main>

  <script>
    function panelLoaded(iframe) {
      iframe.closest('.panel').classList.add('loaded');
    }

    // Fecha en header
    const hoy = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('fechaHoy').textContent =
      hoy.toLocaleDateString('es-CO', opts);

    // Splash screen
    (function() {
      const fill = document.getElementById('splashFill');
      const splash = document.getElementById('splash');
      requestAnimationFrame(() => { fill.style.width = '100%'; });
      setTimeout(() => {
        splash.classList.add('hide');
        setTimeout(() => { splash.style.display = 'none'; }, 650);
      }, 2200);
    })();

    // Tab switching con lazy-load de iframes
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

        btn.classList.add('active');
        const panel = document.getElementById('panel-' + target);
        panel.classList.add('active');

        // Lazy-load: cargar iframe solo cuando se activa el tab
        const iframe = panel.querySelector('iframe[data-src]');
        if (iframe) {
          iframe.src = iframe.dataset.src;
          iframe.removeAttribute('data-src');
        }
      });
    });

  </script>

</body>
</html>
